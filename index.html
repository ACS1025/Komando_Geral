<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Mapa interativo de clientes da Komando GR.">
  <title>Komando GR - Mapa Interativo de Clientes</title>
  <link rel="icon" href="src/Mapa.png" type="image/x-icon" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef1f5;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --border: #e3e6ea;
      --border-strong: #cfd4da;
      --text-primary: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9aa1ab;
      --accent: #2f5fe0;
      --accent-dark: #1f47b8;
      --accent-bg: #eef2fd;
      --gold: #c9971c;
      --gold-bg: #fdf6e3;
      --navy: #0b1f4d;
      --navy-2: #12295f;
      --green: #1b9e5a;
      --green-bg: #e6f7ee;
      --radius: 10px;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
      --shadow-md: 0 6px 20px rgba(16, 24, 40, 0.12);
      --shadow-lg: 0 12px 40px rgba(16, 24, 40, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --surface: #1a1d25;
        --surface-2: #22252e;
        --border: #2d3139;
        --border-strong: #3a3f4a;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-muted: #5f6368;
        --accent-bg: #1a2744;
        --gold-bg: #3d3010;
        --green-bg: #1a3d2a;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(180deg, var(--navy), var(--navy-2));
      color: #fff;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 20;
      height: 56px;
    }

    .brand { display: flex; align-items: center; gap: 12px; }

    .brand-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }

    .brand-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .brand-sub { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 400; margin-left: 8px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .status-live { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: rgba(255,255,255,0.75); }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .dot.pulse { box-shadow: 0 0 0 0 rgba(27,158,90,0.6); animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(27,158,90,0.5); }
      70% { box-shadow: 0 0 0 6px rgba(27,158,90,0); }
      100% { box-shadow: 0 0 0 0 rgba(27,158,90,0); }
    }

    #resetViewBtn {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease;
    }

    #resetViewBtn:hover { background: rgba(255,255,255,0.18); }

    /* ===== STATSBAR ===== */
    #statsbar {
      display: flex;
      gap: 12px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      flex-shrink: 0;
    }
    #statsbar::-webkit-scrollbar { display: none; }

    .stat {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      min-width: 130px;
      flex-shrink: 0;
    }

    .stat-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .stat-label { font-size: 11.5px; color: var(--text-muted); margin: 0; }
    .stat-value { font-size: 15px; font-weight: 700; margin: 0; line-height: 1.3; }

    /* ===== CONTAINER ===== */
    #container { display: flex; height: calc(100vh - 105px); position: relative; }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 300px;
      overflow-y: auto;
      background: var(--surface-2);
      border-right: 1px solid var(--border);
      padding: 14px;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar::-webkit-scrollbar { width: 6px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    .sidebar-toggle {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 16;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
    }

    @media (max-width: 768px) {
      #sidebar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 15;
        transform: translateX(-100%);
        box-shadow: var(--shadow-lg);
      }
      #sidebar.aberto { transform: translateX(0); }
      .sidebar-toggle { display: flex; }
      #container { height: calc(100vh - 105px); }
    }

    /* ===== MAP ===== */
    #mapwrap { flex: 1; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ===== SEARCH ===== */
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
    }

    .search-box input { border: none; outline: none; font-family: inherit; font-size: 13px; flex: 1; background: transparent; color: var(--text-primary); }
    .search-box input::placeholder { color: var(--text-muted); }

    /* ===== FILTERS ===== */
    .btn-group { margin: 0 0 10px; display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; overflow-x: auto; scrollbar-width: none; }
    .btn-group::-webkit-scrollbar { display: none; }

    .btn {
      flex: 1; padding: 7px 12px; cursor: pointer; background: transparent; color: var(--text-secondary);
      border: none; border-radius: 7px; font-family: inherit; font-size: 13px; font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover { background: var(--accent-bg); color: var(--accent-dark); }
    .btn.ativo { background: var(--accent); color: #ffffff; }
    .btn.ativo:hover { background: var(--accent); color: #ffffff; }

    /* ===== LIST META ===== */
    .list-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); margin: 4px 2px 10px; }
    .sort-select { border: none; background: transparent; color: var(--text-muted); font-family: inherit; font-size: 12px; cursor: pointer; }

    /* ===== CLIENT CARD ===== */
    .cliente {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; margin-bottom: 8px; cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      display: flex; gap: 10px;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cliente:hover { border-color: var(--border-strong); box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .cliente.selecionado { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
    .cliente.destaque { background: var(--gold-bg); border: 1px solid #ecd489; }

    .avatar {
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; position: relative;
    }

    .cliente-body { flex: 1; min-width: 0; }

    .cliente-nome { font-weight: 600; font-size: 13.5px; color: var(--text-primary); margin: 0 0 4px; letter-spacing: -0.01em; }
    .cliente-linha { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); margin: 2px 0; }
    .cliente-linha a { color: var(--text-secondary); text-decoration: none; }
    .cliente-linha a:hover { color: var(--accent); }

    .icon { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.6; }

    .links-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }

    .link-btn {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px;
      background: var(--accent-bg); color: var(--accent-dark); border-radius: 6px;
      font-size: 11.5px; font-weight: 500; text-decoration: none; transition: background 0.15s ease;
    }

    .link-btn:hover { background: #dde6fb; }
    .destaque .link-btn { background: #f5e7bd; color: #8a6a10; }
    .destaque .link-btn:hover { background: #f0dda0; }

    /* ===== SKELETON ===== */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      animation: skeleton 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state p:first-of-type { font-size: 14px; font-weight: 500; margin: 0 0 4px; }
    .empty-state p:last-of-type { font-size: 12px; margin: 0; }

    /* ===== MARKERS ===== */
    .leaflet-destaque img { border: 3px solid var(--gold); border-radius: 50%; box-shadow: 0 0 12px 4px rgba(201, 151, 28, 0.45); }
    .leaflet-marker-cliente img { border-radius: 50%; border: 2px solid #fff; box-shadow: var(--shadow-sm); }

    /* ===== PAINEL DETALHE ===== */
    #painel-detalhe {
      position: absolute; top: 16px; right: 16px; width: 260px;
      background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-md);
      z-index: 15; padding: 16px; display: none;
      max-height: calc(100% - 32px);
      overflow-y: auto;
    }

    #painel-detalhe.aberto { display: block; }

    .painel-fechar {
      position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 50%;
      border: none; background: var(--surface-2); color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .painel-fechar:hover { background: var(--border); }

    .painel-avatar {
      width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px; margin-bottom: 10px;
    }

    .painel-nome { font-size: 15px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.01em; }
    .painel-linha { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--text-secondary); margin: 5px 0; }
    .painel-linha a { color: var(--text-secondary); text-decoration: none; }
    .painel-linha a:hover { color: var(--accent); }

    .status-chip {
      display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600;
      color: var(--green); background: var(--green-bg); padding: 3px 8px; border-radius: 6px; margin: 6px 0 10px;
    }

    .painel-links { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }

    .painel-link-btn {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 12.5px; font-weight: 500; color: var(--text-primary); text-decoration: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .painel-link-btn:hover { border-color: var(--border-strong); background: var(--surface-2); }
    .painel-link-btn .icon { opacity: 0.55; }

    .painel-atualizacao { font-size: 11px; color: var(--text-muted); margin-top: 12px; display: flex; align-items: center; gap: 5px; }

    /* Painel Mobile */
    @media (max-width: 768px) {
      #painel-detalhe {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        max-height: 70vh;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #painel-detalhe.aberto {
        display: block;
        transform: translateY(0);
      }
    }

    /* ===== OVERLAY ===== */
    .painel-overlay, .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 14;
    }
    .painel-overlay.ativo, .sidebar-overlay.ativo { display: block; }

    /* ===== ZOOM CONTROL ===== */
    .leaflet-control-zoom { border-radius: 8px !important; overflow: hidden; box-shadow: var(--shadow-sm) !important; }

    /* ===== LEGENDA ===== */
    #legenda {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      box-shadow: var(--shadow-md);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      z-index: 15;
      font-size: 12px;
      color: var(--text-secondary);
    }

    @media (prefers-color-scheme: dark) {
      #legenda { background: rgba(26, 29, 37, 0.9); }
    }

    .legenda-item { display: flex; align-items: center; gap: 6px; }
    .legenda-bola { width: 8px; height: 8px; border-radius: 50%; }

    @media (max-width: 768px) {
      #legenda {
        bottom: 8px;
        padding: 6px 12px;
        gap: 10px;
        font-size: 11px;
      }
    }

    /* ===== POPUP ===== */
    .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: var(--shadow-md); }

    /* ===== TOOLTIP ===== */
    .custom-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      padding: 4px 10px !important;
      font-size: 12px !important;
      font-weight: 500 !important;
      color: var(--text-primary) !important;
      box-shadow: var(--shadow-sm) !important;
    }
    .leaflet-tooltip-top:before { border-top-color: var(--surface) !important; }

    /* ===== RESPONSIVE HEADER ===== */
    @media (max-width: 600px) {
      header { padding: 10px 16px; }
      .brand-sub { display: none; }
      .status-live span:last-child { display: none; }
      #resetViewBtn span { display: none; }
      #statsbar { padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0 0 21 18.382V7.618a1 1 0 0 0-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      </div>
      <span class="brand-title">Mapa de Clientes</span>
      <span class="brand-sub">Komando Gerenciamento de Riscos</span>
    </div>
    <div class="header-right">
      <div class="status-live"><span class="dot pulse"></span><span>Atualizado agora</span></div>
      <button id="resetViewBtn">
        <svg class="icon" style="width:14px;height:14px;opacity:1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        <span>Resetar visualização</span>
      </button>
    </div>
  </header>

  <div id="statsbar">
    <div class="stat">
      <div class="stat-icon" style="background:var(--accent-bg)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dark)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div><p class="stat-label">Clientes</p><p class="stat-value" id="stat-clientes">0</p></div>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:#eef7ee">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2c7a3f" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20Z"/></svg>
      </div>
      <div><p class="stat-label">Estados</p><p class="stat-value" id="stat-estados">0</p></div>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:#f2ecfb">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b3fb0" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>
      </div>
      <div><p class="stat-label">Painéis</p><p class="stat-value" id="stat-paineis">0</p></div>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:var(--green-bg)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      </div>
      <div><p class="stat-label">Briefings</p><p class="stat-value" id="stat-briefings">0</p></div>
    </div>
    <div class="stat">
      <div class="stat-icon" style="background:#fdf1e6">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#b06a1a" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div><p class="stat-label">Atualização</p><p class="stat-value" style="color:var(--green)">Agora</p></div>
    </div>
  </div>

  <div id="container">
    <div id="sidebar">
      <div class="search-box">
        <svg class="icon" style="opacity:0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="busca" placeholder="Buscar cliente..." autocomplete="off">
      </div>

      <div class="btn-group" id="filtros">
        <button class="btn ativo" data-estado="Todos">Todos</button>
        <button class="btn" data-estado="SP">SP</button>
        <button class="btn" data-estado="RJ">RJ</button>
        <button class="btn" data-estado="MG">MG</button>
      </div>

      <div class="list-meta">
        <span id="contagem">0 clientes</span>
        <select class="sort-select" id="ordenar">
          <option value="az">A-Z</option>
          <option value="za">Z-A</option>
        </select>
      </div>

      <div id="lista-clientes"></div>
    </div>

    <div id="mapwrap">
      <button class="sidebar-toggle" id="sidebarToggle" title="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>

      <div id="map"></div>

      <div id="painel-detalhe">
        <button class="painel-fechar" id="painel-fechar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div id="painel-conteudo"></div>
      </div>

      <div id="legenda">
        <div class="legenda-item"><span class="legenda-bola" style="background:var(--gold)"></span>Sede</div>
        <div class="legenda-item"><span class="legenda-bola" style="background:var(--accent)"></span>Cliente</div>
      </div>
    </div>
  </div>

  <!-- Overlays -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="painel-overlay" id="painelOverlay"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const iconPin = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
    const iconPhone = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92Z"/></svg>';
    const iconUser = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    const iconLink = '<svg class="icon" style="width:11px;height:11px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';
    const iconWhats = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';
    const iconClock = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
    const iconSearchEmpty = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.4;margin-bottom:12px"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';

    const PALETA = ['#0b1f4d', '#1b9e5a', '#2f5fe0', '#8a4fd6', '#c9971c', '#d64f5f', '#0f9b8e', '#e0762f'];
    function corPara(nome) {
      let h = 0;
      for (let i = 0; i < nome.length; i++) h = nome.charCodeAt(i) + ((h << 5) - h);
      return PALETA[Math.abs(h) % PALETA.length];
    }
    function inicial(nome) {
      const partes = nome.replace(/[^\\p{L}\\s]/gu, '').trim().split(/\\s+/);
      return (partes[0]?.[0] || '?').toUpperCase();
    }

    let map = L.map('map', { zoomControl: false }).setView([-15.78, -47.93], 4);
    L.control.zoom({ position: 'topleft' }).addTo(map);

    let clientes = [];
    let markers = [];
    let selecionadoId = null;

    const brasilView = { center: [-15.78, -47.93], zoom: 4 };

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Overlays
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const painelOverlay = document.getElementById('painelOverlay');

    // Sidebar toggle
    document.getElementById('sidebarToggle').onclick = () => {
      document.getElementById('sidebar').classList.toggle('aberto');
      sidebarOverlay.classList.toggle('ativo');
    };

    sidebarOverlay.onclick = () => {
      document.getElementById('sidebar').classList.remove('aberto');
      sidebarOverlay.classList.remove('ativo');
    };

    // Reset view
    document.getElementById('resetViewBtn').onclick = () => {
      map.setView(brasilView.center, brasilView.zoom);
    };

    // Fechar painel
    document.getElementById('painel-fechar').onclick = fecharPainel;
    painelOverlay.onclick = fecharPainel;

    function fecharPainel() {
      document.getElementById('painel-detalhe').classList.remove('aberto');
      painelOverlay.classList.remove('ativo');
      selecionadoId = null;
      renderLista();
    }

    function linksDe(c, termo) {
      if (!c.links) return [];
      return c.links.filter(l => l.nome.toLowerCase().includes(termo));
    }

    // Skeleton loading
    function mostrarSkeleton() {
      const lista = document.getElementById('lista-clientes');
      lista.innerHTML = Array(6).fill(0).map(() => `
        <div class="cliente" style="pointer-events:none;animation:none">
          <div class="skeleton" style="width:38px;height:38px;border-radius:9px;flex-shrink:0"></div>
          <div style="flex:1">
            <div class="skeleton" style="width:60%;height:14px;margin-bottom:8px"></div>
            <div class="skeleton" style="width:40%;height:12px"></div>
          </div>
        </div>
      `).join('');
    }

    async function carregarClientes() {
      mostrarSkeleton();

      try {
        const res = await fetch('clientes.json');
        const data = await res.json();

        data.forEach((c, i) => {
          c.id = i;
          if (c.nome === "Komando Gerenciamento de Riscos") c.destaque = true;
          c.telefone = (c.telefone || '').trim();
          c.responsavel = (c.responsavel || '').trim();
        });

        clientes = data;

        // Gerar filtros dinâmicos
        gerarFiltros();

        document.getElementById('stat-clientes').textContent = clientes.length;
        document.getElementById('stat-estados').textContent = new Set(clientes.map(c => c.estado)).size;
        document.getElementById('stat-paineis').textContent = clientes.reduce((n, c) => n + linksDe(c, 'painel').length, 0);
        document.getElementById('stat-briefings').textContent = clientes.reduce((n, c) => n + linksDe(c, 'briefing').length, 0);

        renderLista();
      } catch (err) {
        document.getElementById('lista-clientes').innerHTML = `
          <div class="empty-state">
            <p style="font-size:14px;font-weight:500;margin:0 0 4px">Erro ao carregar dados</p>
            <p style="font-size:12px;margin:0">Verifique se o arquivo clientes.json existe</p>
          </div>
        `;
      }
    }

    function gerarFiltros() {
      const estados = [...new Set(clientes.map(c => c.estado))].sort();
      const container = document.getElementById('filtros');
      container.innerHTML = `
        <button class="btn ativo" data-estado="Todos">Todos</button>
        ${estados.map(e => `<button class="btn" data-estado="${e}">${e}</button>`).join('')}
      `;

      container.addEventListener('click', (e) => {
        const btn = e.target.closest('.btn');
        if (!btn) return;
        document.querySelectorAll('#filtros .btn').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        renderLista();
      });
    }

    function clientesFiltrados() {
      const estadoAtivo = document.querySelector('#filtros .btn.ativo')?.dataset.estado || 'Todos';
      const termo = document.getElementById('busca').value.trim().toLowerCase();
      const ordem = document.getElementById('ordenar').value;

      let lista = estadoAtivo === 'Todos' ? [...clientes] : clientes.filter(c => c.estado === estadoAtivo);
      if (termo) lista = lista.filter(c => c.nome.toLowerCase().includes(termo) || c.cidade.toLowerCase().includes(termo));

      lista.sort((a, b) => ordem === 'az' ? a.nome.localeCompare(b.nome) : b.nome.localeCompare(a.nome));
      return lista;
    }

    function abrirPainel(c) {
      selecionadoId = c.id;
      const cor = corPara(c.nome);
      const painel = document.getElementById('painel-detalhe');
      const foneDigitos = c.telefone.replace(/\\D/g, '');

      document.getElementById('painel-conteudo').innerHTML = `
        <div class="painel-avatar" style="background:${cor}">${inicial(c.nome)}</div>
        <p class="painel-nome">${c.nome}</p>
        <div class="painel-linha">${iconPin} ${c.cidade}/${c.estado}</div>
        ${c.responsavel ? `<div class="painel-linha">${iconUser} ${c.responsavel}</div>` : ''}
        ${c.telefone ? `<div class="painel-linha">${iconPhone} <a href="tel:${foneDigitos}">${c.telefone}</a></div>` : ''}
        <div class="status-chip"><span class="dot"></span>Ativo</div>
        <div class="painel-links">
          ${(c.links || []).map(l => `<a class="painel-link-btn" href="${l.url}" target="_blank">${iconLink} ${l.nome}</a>`).join('')}
          ${foneDigitos ? `<a class="painel-link-btn" href="https://wa.me/55${foneDigitos}" target="_blank">${iconWhats} WhatsApp</a>` : ''}
        </div>
        <div class="painel-atualizacao">${iconClock} Última atualização: agora</div>
      `;
      painel.classList.add('aberto');
      painelOverlay.classList.add('ativo');
      renderLista();
    }

    function renderLista() {
      const lista = document.getElementById('lista-clientes');
      lista.innerHTML = '';

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const filtrados = clientesFiltrados();
      document.getElementById('contagem').textContent = `${filtrados.length} cliente${filtrados.length === 1 ? '' : 's'}`;

      // Estado vazio
      if (filtrados.length === 0) {
        lista.innerHTML = `
          <div class="empty-state">
            ${iconSearchEmpty}
            <p>Nenhum cliente encontrado</p>
            <p>Tente outro termo de busca</p>
          </div>
        `;
        map.setView(brasilView.center, brasilView.zoom);
        return;
      }

      let bounds = [];

      filtrados.forEach((c, index) => {
        const cor = corPara(c.nome);
        const item = document.createElement('div');
        item.className = 'cliente' + (c.destaque ? ' destaque' : '') + (c.id === selecionadoId ? ' selecionado' : '');
        item.style.animationDelay = `${index * 0.03}s`;
        item.innerHTML = `
          <div class="avatar" style="background:${cor}">${inicial(c.nome)}<span class="dot" style="position:absolute;bottom:-2px;right:-2px;width:9px;height:9px;border:2px solid var(--surface);border-radius:50%;background:var(--green)"></span></div>
          <div class="cliente-body">
            <p class="cliente-nome">${c.nome}</p>
            <div class="cliente-linha">${iconPin} ${c.cidade}/${c.estado}</div>
            ${c.responsavel ? `<div class="cliente-linha">${iconUser} ${c.responsavel}</div>` : ''}
            ${c.links?.length ? `<div class="links-row">${c.links.map(l => `<a class="link-btn" href="${l.url}" target="_blank" onclick="event.stopPropagation()">${iconLink} ${l.nome}</a>`).join('')}</div>` : ''}
          </div>
        `;
        item.onclick = () => {
          map.setView([c.latitude, c.longitude], 10);
          abrirPainel(c);
          // Fechar sidebar em mobile ao clicar
          if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('aberto');
            sidebarOverlay.classList.remove('ativo');
          }
        };
        lista.appendChild(item);

        const isDestaque = c.destaque === true;
        const icon = L.icon({
          iconUrl: c.logo,
          iconSize: isDestaque ? [56, 56] : [38, 38],
          iconAnchor: [isDestaque ? 28 : 19, isDestaque ? 56 : 38],
          popupAnchor: [0, -38],
          className: isDestaque ? 'leaflet-destaque' : 'leaflet-marker-cliente'
        });

        const marker = L.marker([c.latitude, c.longitude], { icon }).addTo(map);
        marker.on('click', () => abrirPainel(c));
        marker.bindTooltip(c.nome, {
          permanent: false,
          direction: 'top',
          offset: [0, -10],
          className: 'custom-tooltip'
        });
        markers.push(marker);
        bounds.push([c.latitude, c.longitude]);
      });

      if (bounds.length > 0) map.fitBounds(bounds, { padding: [50, 50] });
      else map.setView(brasilView.center, brasilView.zoom);
    }

    document.getElementById('busca').addEventListener('input', renderLista);
    document.getElementById('ordenar').addEventListener('change', renderLista);

    carregarClientes();
  </script>
</body>
</html>
