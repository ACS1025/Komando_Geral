<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mapa interativo de clientes da Komando GR.">
  <title>Komando GR - Mapa Interativo de Clientes</title>
  <link rel="icon" href="src/Mapa.png" type="image/x-icon" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #fafbfc;
      --border: #e3e6ea;
      --border-strong: #cfd4da;
      --text-primary: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9aa1ab;
      --accent: #2f5fe0;
      --accent-dark: #1f47b8;
      --accent-bg: #eef2fd;
      --gold: #c9971c;
      --gold-bg: #fdf6e3;
      --radius: 10px;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.06);
      --shadow-md: 0 4px 14px rgba(16, 24, 40, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      position: relative;
      z-index: 10;
    }

    header span {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #container { display: flex; height: calc(100vh - 53px); }

    #sidebar {
      width: 300px;
      overflow-y: auto;
      background: var(--surface-2);
      border-right: 1px solid var(--border);
      padding: 16px;
    }

    #sidebar::-webkit-scrollbar { width: 8px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    #map { flex: 1; height: 100%; }

    .btn-group {
      margin: 0 0 16px;
      display: flex;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
    }

    .btn {
      flex: 1;
      padding: 7px 0;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn:hover { background: var(--accent-bg); color: var(--accent-dark); }

    .btn.ativo {
      background: var(--accent);
      color: #ffffff;
    }

    .btn.ativo:hover { background: var(--accent); color: #ffffff; }

    #resetViewBtn {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    #resetViewBtn:hover { border-color: var(--border-strong); color: var(--text-primary); }

    .cliente {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
    }

    .cliente:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .cliente.destaque {
      background: var(--gold-bg);
      border: 1px solid #ecd489;
    }

    .cliente-nome {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }

    .cliente-linha {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--text-secondary);
      margin: 3px 0;
    }

    .cliente-linha a { color: var(--text-secondary); text-decoration: none; }
    .cliente-linha a:hover { color: var(--accent); }

    .icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .links-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--accent-bg);
      color: var(--accent-dark);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s ease;
    }

    .link-btn:hover { background: #dde6fb; }

    .destaque .link-btn {
      background: #f5e7bd;
      color: #8a6a10;
    }

    .destaque .link-btn:hover { background: #f0dda0; }

    .leaflet-destaque img {
      border: 3px solid var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 12px 4px rgba(201, 151, 28, 0.45);
    }

    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: var(--shadow-md);
    }

    .popup-nome {
      font-weight: 600;
      font-size: 14px;
      margin: 0 0 6px;
      color: var(--text-primary);
    }

    .popup-linha {
      font-size: 12.5px;
      color: var(--text-secondary);
      margin: 3px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .popup-linha a { color: var(--text-secondary); text-decoration: none; }
    .popup-linha a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <span>Mapa de Clientes</span>
    <button id="resetViewBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Resetar visualização
    </button>
  </header>
  <div id="container">
    <div id="sidebar">
      <div class="btn-group" id="filtros">
        <button class="btn ativo" data-estado="Todos">Todos</button>
        <button class="btn" data-estado="SP">SP</button>
        <button class="btn" data-estado="RJ">RJ</button>
        <button class="btn" data-estado="MG">MG</button>
      </div>
      <div id="lista-clientes"></div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const iconPin = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>';
    const iconPhone = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92Z"/></svg>';
    const iconUser = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
    const iconLink = '<svg class="icon" style="width:12px;height:12px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';

    let map = L.map('map').setView([-15.78, -47.93], 4);
    let clientes = [];
    let markers = [];

    const brasilView = {
      center: [-15.78, -47.93],
      zoom: 4
    };

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    document.getElementById('resetViewBtn').onclick = () => {
      map.setView(brasilView.center, brasilView.zoom);
    };

    async function carregarClientes() {
      const res = await fetch('clientes.json');
      const data = await res.json();

      data.forEach(c => {
        if (c.nome === "Komando Gerenciamento de Riscos") {
          c.destaque = true;
        }
        c.telefone = (c.telefone || '').trim();
        c.responsavel = (c.responsavel || '').trim();
      });

      clientes = data;
      atualizarLista('Todos');
    }

    function atualizarLista(estado) {
      const lista = document.getElementById('lista-clientes');
      lista.innerHTML = '';

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const filtrados = estado === 'Todos' ? clientes : clientes.filter(c => c.estado === estado);
      let bounds = [];

      filtrados.forEach(c => {
        const item = document.createElement('div');
        item.className = 'cliente' + (c.destaque ? ' destaque' : '');
        item.innerHTML = `
          <p class="cliente-nome">${c.nome}</p>
          <div class="cliente-linha">${iconPin} ${c.cidade}/${c.estado}</div>
          ${c.telefone ? `<div class="cliente-linha">${iconPhone} <a href="tel:${c.telefone.replace(/\D/g, '')}">${c.telefone}</a></div>` : ''}
          ${c.responsavel ? `<div class="cliente-linha">${iconUser} ${c.responsavel}</div>` : ''}
          ${c.links?.length ? `<div class="links-row">${c.links.map(l => `<a class="link-btn" href="${l.url}" target="_blank">${iconLink} ${l.nome}</a>`).join('')}</div>` : ''}
        `;
        item.onclick = () => {
          map.setView([c.latitude, c.longitude], 10);
        };
        lista.appendChild(item);

        const isDestaque = c.destaque === true;

        const icon = L.icon({
          iconUrl: c.logo,
          iconSize: isDestaque ? [60, 60] : [40, 40],
          iconAnchor: [isDestaque ? 30 : 20, isDestaque ? 60 : 40],
          popupAnchor: [0, -40],
          className: isDestaque ? 'leaflet-destaque' : ''
        });

        const marker = L.marker([c.latitude, c.longitude], { icon })
          .addTo(map)
          .bindPopup(`
            <div style="font-family:'Inter',sans-serif;">
              <p class="popup-nome">${c.nome}</p>
              <div class="popup-linha">${iconPin} ${c.cidade}/${c.estado}</div>
              ${c.telefone ? `<div class="popup-linha">${iconPhone} <a href="tel:${c.telefone.replace(/\D/g, '')}">${c.telefone}</a></div>` : ''}
              ${c.responsavel ? `<div class="popup-linha">${iconUser} ${c.responsavel}</div>` : ''}
              ${c.links?.length ? `<div class="links-row">${c.links.map(l => `<a class="link-btn" href="${l.url}" target="_blank">${iconLink} ${l.nome}</a>`).join('')}</div>` : ''}
            </div>
          `);

        markers.push(marker);
        bounds.push([c.latitude, c.longitude]);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50] });
      } else {
        map.setView(brasilView.center, brasilView.zoom);
      }
    }

    document.getElementById('filtros').addEventListener('click', (e) => {
      const btn = e.target.closest('.btn');
      if (btn) {
        document.querySelectorAll('#filtros .btn').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        atualizarLista(btn.dataset.estado);
      }
    });

    carregarClientes();
  </script>
</body>
</html>
